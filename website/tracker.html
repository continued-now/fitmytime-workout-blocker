<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2563EB">
  <title>FitMyTime Tracker</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRml0TXlUaW1lIFRyYWNrZXIiLCJzaG9ydF9uYW1lIjoiRml0TXlUaW1lIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJ0aGVtZV9jb2xvciI6IiMyNTYzRUIiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZhZjlmNiJ9">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #2563EB;
      --blue-light: #EFF6FF;
      --green: #16A34A;
      --green-light: #F0FDF4;
      --orange: #EA580C;
      --orange-light: #FFF7ED;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- Header ---- */
    .header {
      background: var(--blue);
      color: white;
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-brand { font-size: 12px; opacity: 0.8; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 700; }
    .header-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 13px; opacity: 0.9; }
    .header-meta span { display: flex; align-items: center; gap: 4px; }

    /* ---- Elapsed bar ---- */
    .elapsed-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: white;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 9;
    }
    .elapsed-time { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--gray-900); }
    .elapsed-label { font-size: 11px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
    .rest-btns { display: flex; gap: 6px; }
    .rest-btn {
      border: 1px solid var(--gray-200);
      background: white;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
    }
    .rest-btn.active { background: var(--orange-light); border-color: var(--orange); color: var(--orange); font-weight: 600; }
    .rest-btn:active { transform: scale(0.96); }

    /* ---- Main content ---- */
    .content { flex: 1; padding: 16px 16px 120px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gray-400);
      margin: 16px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ---- Warm-up / Cool-down ---- */
    .phase-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.6;
    }

    /* ---- Exercise cards ---- */
    .exercise-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .exercise-card.done { border-color: var(--green); background: var(--green-light); }
    .exercise-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .exercise-target { font-size: 13px; color: var(--gray-500); margin-bottom: 10px; }
    .exercise-pr-note { font-size: 12px; color: var(--orange); margin-bottom: 10px; font-weight: 500; }

    .weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .weight-label { font-size: 13px; color: var(--gray-500); flex-shrink: 0; }
    .weight-input {
      width: 72px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      outline: none;
    }
    .weight-input:focus { border-color: var(--blue); }
    .weight-unit { font-size: 13px; color: var(--gray-400); }

    .sets-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .set-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 2px solid var(--gray-200);
      background: white;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .set-btn.done { border-color: var(--green); background: var(--green); color: white; }
    .set-btn:active { transform: scale(0.92); }

    /* ---- Complete button ---- */
    .complete-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid var(--gray-200);
      z-index: 10;
    }
    .complete-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .complete-btn:disabled { opacity: 0.5; }
    .complete-btn:active:not(:disabled) { transform: scale(0.98); }
    .complete-progress { font-size: 12px; text-align: center; color: var(--gray-500); margin-top: 6px; }

    /* ---- Bottom nav ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: white;
      border-top: 1px solid var(--gray-200);
      z-index: 11;
    }
    .nav-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: none;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      text-align: center;
    }
    .nav-btn.active { color: var(--blue); font-weight: 600; }
    .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

    /* ---- Stats view ---- */
    .stats-view { display: none; }
    .stats-view.active { display: block; }
    .workout-view.hidden { display: none; }

    .stats-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stats-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stats-value { font-size: 28px; font-weight: 700; color: var(--gray-900); }
    .stats-label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

    .pr-table {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .pr-table-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--gray-200);
    }
    .pr-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      padding: 10px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-100);
      align-items: center;
    }
    .pr-row:last-child { border-bottom: none; }
    .pr-exercise { font-weight: 500; }
    .pr-weight { font-weight: 600; color: var(--blue); text-align: right; }
    .pr-date { font-size: 12px; color: var(--gray-400); text-align: right; }

    .history-entry {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .history-entry-header { display: flex; justify-content: space-between; align-items: center; }
    .history-entry-title { font-weight: 600; font-size: 14px; }
    .history-entry-date { font-size: 12px; color: var(--gray-400); }
    .history-entry-details { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

    /* ---- Summary overlay ---- */
    .summary-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .summary-overlay.hidden { display: none; }
    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .summary-check { font-size: 48px; margin-bottom: 12px; }
    .summary-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .summary-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; }
    .summary-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; }
    .summary-stat-value { font-size: 24px; font-weight: 700; }
    .summary-stat-label { font-size: 12px; color: var(--gray-500); }
    .summary-prs { margin-bottom: 20px; }
    .summary-pr-item { font-size: 14px; color: var(--orange); font-weight: 500; padding: 4px 0; }
    .summary-close {
      border: none;
      background: var(--blue);
      color: white;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }
    .empty-state p { font-size: 15px; margin-bottom: 8px; }

    /* ---- Rest countdown overlay ---- */
    .rest-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .rest-overlay.hidden { display: none; }
    .rest-countdown { font-size: 72px; font-weight: 700; color: white; font-variant-numeric: tabular-nums; }
    .rest-countdown-label { font-size: 16px; color: rgba(255,255,255,0.8); margin-top: 8px; }
    .rest-skip {
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.4);
      background: none;
      color: white;
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ---- Data ----
    const STORAGE_KEY = 'fitmytime_tracker';

    function loadStore() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch { return {}; }
    }
    function saveStore(store) { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); }

    function getWorkout() {
      const hash = location.hash.slice(1);
      if (!hash) return null;
      try { return JSON.parse(atob(hash)); }
      catch { return null; }
    }

    // ---- State ----
    const workout = getWorkout();
    const store = loadStore();
    if (!store.prs) store.prs = {};
    if (!store.history) store.history = [];

    let currentView = 'workout'; // 'workout' | 'stats'
    let setsDone = {}; // { exerciseIndex: [true, false, ...] }
    let weights = {};  // { exerciseIndex: number }
    let elapsedSecs = 0;
    let elapsedTimer = null;
    let restSecs = 0;
    let restTimer = null;
    let completed = false;

    // Init sets and weights from workout data
    if (workout) {
      workout.ex.forEach((ex, i) => {
        setsDone[i] = new Array(ex.s).fill(false);
        weights[i] = ex.tw || ex.pw || 0;
      });
    }

    // ---- Render ----
    function render() {
      const app = document.getElementById('app');
      if (!workout) {
        app.innerHTML = `
          <div class="header">
            <div class="header-brand">FitMyTime</div>
            <div class="header-title">No Workout Loaded</div>
          </div>
          <div class="content">
            <div class="empty-state">
              <p>Open a workout link from your Google Calendar to start tracking.</p>
            </div>
            ${renderStatsSection()}
          </div>
          ${renderBottomNav()}
        `;
        bindNav();
        return;
      }

      const totalSets = workout.ex.reduce((sum, ex) => sum + ex.s, 0);
      const doneSets = Object.values(setsDone).flat().filter(Boolean).length;
      const mm = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
      const ss = String(elapsedSecs % 60).padStart(2, '0');

      app.innerHTML = `
        <div class="header">
          <div class="header-brand">FitMyTime</div>
          <div class="header-title">${esc(workout.t)}</div>
          <div class="header-meta">
            <span>${workout.d} min</span>
            <span>${capitalize(workout.i)} intensity</span>
            <span>${workout.ex.length} exercises</span>
          </div>
        </div>

        <div class="elapsed-bar">
          <div>
            <div class="elapsed-time">${mm}:${ss}</div>
            <div class="elapsed-label">Elapsed</div>
          </div>
          <div class="rest-btns">
            <button class="rest-btn" onclick="startRest(60)">60s</button>
            <button class="rest-btn" onclick="startRest(90)">90s</button>
            <button class="rest-btn" onclick="startRest(120)">2m</button>
          </div>
        </div>

        <div class="content workout-view${currentView !== 'workout' ? ' hidden' : ''}">
          <div class="section-label">Warm-up (3 min)</div>
          <div class="phase-card">${getWarmup(workout.t)}</div>

          <div class="section-label">Exercises</div>
          ${workout.ex.map((ex, i) => renderExercise(ex, i)).join('')}

          <div class="section-label">Cool-down (3 min)</div>
          <div class="phase-card">${getCooldown(workout.t)}</div>
        </div>

        <div class="stats-view${currentView === 'stats' ? ' active' : ''}">
          <div class="content">
            ${renderStatsSection()}
          </div>
        </div>

        ${!completed ? `
        <div class="complete-bar" style="bottom: 46px;">
          <button class="complete-btn" onclick="completeWorkout()" ${doneSets === 0 ? 'disabled' : ''}>
            Complete Workout
          </button>
          <div class="complete-progress">${doneSets} of ${totalSets} sets done</div>
        </div>` : ''}

        ${renderBottomNav()}

        <div class="rest-overlay${restSecs <= 0 ? ' hidden' : ''}" id="restOverlay">
          <div class="rest-countdown" id="restCountdown">${restSecs}</div>
          <div class="rest-countdown-label">Rest</div>
          <button class="rest-skip" onclick="skipRest()">Skip</button>
        </div>

        <div class="summary-overlay hidden" id="summaryOverlay"></div>
      `;

      bindNav();

      // Start elapsed timer on first render
      if (!elapsedTimer && !completed) {
        elapsedTimer = setInterval(() => { elapsedSecs++; updateElapsed(); }, 1000);
      }
    }

    function renderExercise(ex, i) {
      const allDone = setsDone[i].every(Boolean);
      const prNote = ex.pw ? `Previous: ${ex.pw}lb | Target: ${ex.tw}lb` : '';
      const repsLabel = ex.dur ? `${ex.s} sets, ${ex.dur}s each` : `${ex.s} sets x ${ex.r} reps`;

      return `
        <div class="exercise-card${allDone ? ' done' : ''}">
          <div class="exercise-name">${esc(ex.n)}</div>
          <div class="exercise-target">${repsLabel}</div>
          ${prNote ? `<div class="exercise-pr-note">${prNote}</div>` : ''}
          ${!ex.dur ? `
          <div class="weight-row">
            <span class="weight-label">Weight</span>
            <input class="weight-input" type="number" inputmode="decimal" value="${weights[i] || ''}"
              onchange="weights[${i}]=parseFloat(this.value)||0" placeholder="0">
            <span class="weight-unit">lb</span>
          </div>` : ''}
          <div class="sets-row">
            ${setsDone[i].map((done, si) => `
              <button class="set-btn${done ? ' done' : ''}" onclick="toggleSet(${i},${si})">
                ${done ? 'S' + (si + 1) : si + 1}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderStatsSection() {
      const prs = Object.entries(store.prs);
      const history = store.history.slice(0, 20);
      const totalWorkouts = store.history.length;
      const totalMinutes = store.history.reduce((sum, h) => sum + (h.duration || 0), 0);

      return `
        <div class="section-label">Overview</div>
        <div class="stats-summary">
          <div class="stats-card">
            <div class="stats-value">${totalWorkouts}</div>
            <div class="stats-label">Workouts</div>
          </div>
          <div class="stats-card">
            <div class="stats-value">${totalMinutes}m</div>
            <div class="stats-label">Total time</div>
          </div>
        </div>

        ${prs.length > 0 ? `
        <div class="section-label">Personal Records</div>
        <div class="pr-table">
          <div class="pr-table-header">
            <span>Exercise</span>
            <span>Best</span>
            <span>Date</span>
          </div>
          ${prs.map(([name, pr]) => `
            <div class="pr-row">
              <span class="pr-exercise">${esc(name)}</span>
              <span class="pr-weight">${pr.weight > 0 ? pr.weight + 'lb' : 'BW'} ${pr.sets}x${pr.reps}</span>
              <span class="pr-date">${new Date(pr.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
            </div>
          `).join('')}
        </div>` : ''}

        ${history.length > 0 ? `
        <div class="section-label">Recent Workouts</div>
        ${history.map(h => `
          <div class="history-entry">
            <div class="history-entry-header">
              <span class="history-entry-title">${esc(h.title)}</span>
              <span class="history-entry-date">${new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
            </div>
            <div class="history-entry-details">${h.duration}min | ${h.exercises} exercises${h.newPRs > 0 ? ' | ' + h.newPRs + ' new PR' + (h.newPRs > 1 ? 's' : '') : ''}</div>
          </div>
        `).join('')}` : ''}
      `;
    }

    function renderBottomNav() {
      return `
        <div class="bottom-nav">
          <button class="nav-btn${currentView === 'workout' ? ' active' : ''}" data-view="workout">
            <span class="nav-icon">${workout ? '\u{1F3CB}' : '\u{1F4CA}'}</span>
            ${workout ? 'Workout' : 'Home'}
          </button>
          <button class="nav-btn${currentView === 'stats' ? ' active' : ''}" data-view="stats">
            <span class="nav-icon">\u{1F4CA}</span>
            Stats
          </button>
        </div>
      `;
    }

    function bindNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
          currentView = btn.dataset.view;
          render();
        };
      });
    }

    // ---- Actions ----
    function toggleSet(exIdx, setIdx) {
      setsDone[exIdx][setIdx] = !setsDone[exIdx][setIdx];
      render();
    }

    function updateElapsed() {
      const el = document.querySelector('.elapsed-time');
      if (el) {
        const mm = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
        const ss = String(elapsedSecs % 60).padStart(2, '0');
        el.textContent = mm + ':' + ss;
      }
    }

    function startRest(seconds) {
      restSecs = seconds;
      const overlay = document.getElementById('restOverlay');
      const countdown = document.getElementById('restCountdown');
      if (overlay) overlay.classList.remove('hidden');
      if (countdown) countdown.textContent = restSecs;

      if (restTimer) clearInterval(restTimer);
      restTimer = setInterval(() => {
        restSecs--;
        if (countdown) countdown.textContent = restSecs;
        if (restSecs <= 0) {
          clearInterval(restTimer);
          restTimer = null;
          if (overlay) overlay.classList.add('hidden');
          // Vibrate if available
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
      }, 1000);
    }

    function skipRest() {
      restSecs = 0;
      if (restTimer) { clearInterval(restTimer); restTimer = null; }
      const overlay = document.getElementById('restOverlay');
      if (overlay) overlay.classList.add('hidden');
    }

    function completeWorkout() {
      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      completed = true;

      // Calculate new PRs
      const newPRs = [];
      workout.ex.forEach((ex, i) => {
        const completedSets = setsDone[i].filter(Boolean).length;
        if (completedSets === 0) return;
        const w = weights[i] || 0;
        const reps = ex.r || 0;
        const existing = store.prs[ex.n];
        const isNewPR = !existing ||
          w > existing.weight ||
          (w === existing.weight && completedSets * reps > existing.sets * existing.reps);

        if (isNewPR) {
          store.prs[ex.n] = { weight: w, sets: completedSets, reps: reps, date: new Date().toISOString() };
          newPRs.push(ex.n);
        }
      });

      // Save to history
      const totalSets = Object.values(setsDone).flat().filter(Boolean).length;
      store.history.unshift({
        title: workout.t,
        date: new Date().toISOString(),
        duration: Math.round(elapsedSecs / 60),
        exercises: workout.ex.length,
        sets: totalSets,
        newPRs: newPRs.length,
      });
      store.history = store.history.slice(0, 100);
      saveStore(store);

      // Show summary
      const mm = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
      const ss = String(elapsedSecs % 60).padStart(2, '0');
      render();

      const overlay = document.getElementById('summaryOverlay');
      if (overlay) {
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
          <div class="summary-card">
            <div class="summary-check">\u{2705}</div>
            <div class="summary-title">Workout Complete</div>
            <div class="summary-subtitle">${esc(workout.t)}</div>
            <div class="summary-stats">
              <div>
                <div class="summary-stat-value">${mm}:${ss}</div>
                <div class="summary-stat-label">Duration</div>
              </div>
              <div>
                <div class="summary-stat-value">${totalSets}</div>
                <div class="summary-stat-label">Sets</div>
              </div>
            </div>
            ${newPRs.length > 0 ? `
            <div class="summary-prs">
              ${newPRs.map(name => `<div class="summary-pr-item">New PR: ${esc(name)}</div>`).join('')}
            </div>` : ''}
            <button class="summary-close" onclick="closeSummary()">Done</button>
          </div>
        `;
      }
    }

    function closeSummary() {
      const overlay = document.getElementById('summaryOverlay');
      if (overlay) overlay.classList.add('hidden');
      currentView = 'stats';
      render();
    }

    // ---- Helpers ----
    function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function getWarmup(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('upper')) return 'Arm circles (30s) &rarr; Shoulder rolls (30s) &rarr; 10 Jumping jacks &rarr; 5 Push-ups';
      if (t.includes('lower')) return '10 Bodyweight squats &rarr; Leg swings (30s/side) &rarr; Hip circles (30s) &rarr; 10 Jumping jacks';
      if (t.includes('cardio')) return 'March in place (30s) &rarr; High knees (30s) &rarr; Arm circles (20s) &rarr; 10 Jumping jacks';
      if (t.includes('hiit')) return 'March in place (30s) &rarr; High knees (30s) &rarr; Arm circles (20s) &rarr; 5 Bodyweight squats';
      if (t.includes('flex')) return 'Deep breathing (30s) &rarr; Gentle neck rolls &rarr; Cat-cow (5 reps) &rarr; Standing side stretch';
      if (t.includes('core')) return 'Deep breathing (30s) &rarr; Hip circles (30s) &rarr; Cat-cow (5 reps) &rarr; Dead bug (5/side)';
      return 'Arm circles (30s) &rarr; 10 Bodyweight squats &rarr; Hip circles (20s) &rarr; 10 Jumping jacks';
    }

    function getCooldown(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('upper')) return 'Chest stretch (30s/side) &rarr; Tricep stretch (30s/side) &rarr; Shoulder stretch (30s/side)';
      if (t.includes('lower')) return 'Hamstring stretch (30s/side) &rarr; Quad stretch (30s/side) &rarr; Calf stretch (30s/side)';
      if (t.includes('cardio')) return 'Walk in place (1 min) &rarr; Hamstring stretch (30s/side) &rarr; Deep breathing (30s)';
      if (t.includes('hiit')) return 'Walk in place (1 min) &rarr; Forward fold (30s) &rarr; Child\'s pose (30s)';
      if (t.includes('flex')) return 'Savasana (1 min) &rarr; Deep breathing (30s)';
      if (t.includes('core')) return 'Child\'s pose (30s) &rarr; Spinal twist (30s/side) &rarr; Deep breathing (30s)';
      return 'Forward fold (30s) &rarr; Chest stretch (30s/side) &rarr; Child\'s pose (30s)';
    }

    // ---- Boot ----
    render();
  </script>
</body>
</html>
